name: Curriculum feedback
description: Suggest a curriculum improvement
title: "Curriculum feedback: "
labels: ["documentation"]
body:
  - type: textarea
    id: section
    attributes:
      label: Section or module
      description: Which file, module, or topic needs improvement?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Keep it specific and beginner-friendly.
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Supporting public source
      description: Add a primary or official source when possible.
    validations:
      required: false
